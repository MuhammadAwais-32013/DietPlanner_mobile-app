name: diabp_mobile
description: DiaBP Diet Consultant - AI-Powered Personalized Nutrition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.1
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # Local storage (replaces localStorage / JWT)
  shared_preferences: ^2.2.2

  # File upload (medical docs)
  file_picker: ^8.1.4

  # PDF generation (replaces jsPDF)
  pdf: ^3.10.8
  printing: ^5.12.0

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # Markdown rendering for AI responses
  flutter_markdown: ^0.6.23

  # Image
  cached_network_image: ^3.3.1

  # Animations
  lottie: ^3.1.0

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
