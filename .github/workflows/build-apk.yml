name: Build Android APK

# This tells GitHub to run this script whenever you push code, 
# or when you click a manual "Run workflow" button.
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java (required for Android)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Install Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Get Flutter dependencies
      - name: Install Dependencies
        run: flutter pub get
        working-directory: ./diabp_mobile

      # 5. Build the APK
      - name: Build Release APK
        run: flutter build apk --release
        working-directory: ./diabp_mobile

      # 6. Upload the APK to GitHub so you can download it!
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-flutter-apk
          path: diabp_mobile/build/app/outputs/flutter-apk/app-release.apk
